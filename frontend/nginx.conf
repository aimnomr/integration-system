server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # React Router uses client-side routing — every unknown path falls back
    # to index.html so a hard refresh on /robots/:serial doesn't 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed assets (Vite emits content-hashed filenames).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Never cache index.html — it pins the current bundle hashes.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}

# Mosquitto broker configuration — AMR Integration System.
# Anonymous access is intentional: this is a local-development / FYP broker on a
# trusted network. Securing MQTT (TLS + credentials) is tracked as part of G10.

listener 1883
allow_anonymous true

# WebSocket listener for the browser frontend (mqtt.js over WS subscribes the
# VDA5050 state / connection topics directly). Separate listener so existing
# TCP clients (FastAPI, Node-RED, ROS Bridge) are unaffected.
listener 9001
protocol websockets
allow_anonymous true

# Persist retained messages (the VDA5050 `connection` topic is retained) so the
# last connection state survives a broker restart.
persistence true
persistence_location /mosquitto/data/
